  <!-- LOCATION ENTRY MODAL -->
  <div class="modal-backdrop" id="modal-location">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Manage Locations</div>
        <button class="x" data-close>&times;</button>
      </div>
      <form method="post" action="/locations/new" id="locationForm">
        <div class="modal-body">
          <div class="field">
            <label>Select Location to Edit</label>
            <select id="locationSelect">
              <option value="">-- Add New Location --</option>
              <!-- Populated by JS -->
            </select>
          </div>
          <hr style="border:0; border-top:1px solid #e2e8f0; margin:16px 0;">

          <div class="grid2">
            <div class="field">
              <label>Location Name (required)</label>
              <input name="name" id="locName" placeholder="e.g., Eugene Warehouse" required>
            </div>
            <div class="field">
              <label>Type</label>
              <select name="type" id="locType">
                <option value="Hub">Hub</option>
                <option value="Store">Store</option>
                <option value="Farm">Farm</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>Street Address</label>
            <input name="address_street" id="locAddress" placeholder="e.g., 123 Main St">
          </div>

          <div class="grid2">
            <div class="field">
              <label>City</label>
              <input name="city" id="locCity" placeholder="e.g., Eugene">
            </div>
            <div class="field">
              <label>State</label>
              <input name="state" id="locState" placeholder="e.g., OR">
            </div>
          </div>

          <div class="grid2">
            <div class="field">
              <label>Zip Code</label>
              <input name="zip_code" id="locZip" placeholder="e.g., 97401">
            </div>
            <div class="field">
              <label>Phone</label>
              <input name="phone" id="locPhone" placeholder="e.g., 555-0123">
            </div>
          </div>

          <div class="grid2">
            <div class="field">
              <label>Avg Load Mins</label>
              <input name="avg_load_minutes" id="locLoad" placeholder="30">
            </div>
            <div class="field">
              <label>Avg Unload Mins</label>
              <input name="avg_unload_minutes" id="locUnload" placeholder="30">
            </div>
          </div>

          <div class="hint">After saving, it appears in Start/Destination dropdowns.</div>
        </div>
        <div class="modal-actions">
          <button class="btn" type="button" id="btnDeleteLocation" style="background-color:#dc2626; color:white; border:0; margin-right:auto; display:none;">Delete</button>
          <button class="btn" type="button" data-close>Cancel</button>
          <button class="btn primary" type="submit">Save Location</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const sel = document.getElementById("locationSelect");
      if(!sel) return;

      // Populate
      locationsData.forEach(l => {
        const opt = document.createElement("option");
        opt.value = l.location_id;
        opt.textContent = l.name;
        sel.appendChild(opt);
      });

      // Handle Change
      sel.addEventListener("change", () => {
        const val = sel.value;
        const form = document.getElementById("locationForm");
        const btnDel = document.getElementById("btnDeleteLocation");
        
        if(!val) {
          // Add New
          form.action = "/locations/new";
          document.getElementById("locName").value = "";
          document.getElementById("locType").value = "Hub";
          document.getElementById("locAddress").value = "";
          document.getElementById("locCity").value = "";
          document.getElementById("locState").value = "";
          document.getElementById("locZip").value = "";
          document.getElementById("locPhone").value = "";
          document.getElementById("locLoad").value = "";
          document.getElementById("locUnload").value = "";
          if(btnDel) btnDel.style.display = "none";
        } else {
          // Edit
          const l = locationsData.find(x => x.location_id == val);
          if(l){
            form.action = `/locations/${l.location_id}/edit`;
            document.getElementById("locName").value = l.name || "";
            document.getElementById("locType").value = l.type || "Hub";
            document.getElementById("locAddress").value = l.address_street || "";
            document.getElementById("locCity").value = l.city || "";
            document.getElementById("locState").value = l.state || "";
            document.getElementById("locZip").value = l.zip_code || "";
            document.getElementById("locPhone").value = l.phone || "";
            document.getElementById("locLoad").value = l.avg_load_minutes || "";
            document.getElementById("locUnload").value = l.avg_unload_minutes || "";
            if(btnDel) btnDel.style.display = "inline-block";
          }
        }
      });

      const btnDel = document.getElementById("btnDeleteLocation");
      if(btnDel){
        btnDel.addEventListener("click", async () => {
          const val = document.getElementById("locationSelect").value;
          if(!val) return;
          if(!confirm("Are you sure you want to delete this location?")) return;

          try {
            const res = await fetch(`/locations/${val}/delete`, { method: "POST" });
            const data = await res.json();
            if(data.success) window.location.reload();
            else alert(data.message);
          } catch(e) { alert("Error deleting location"); }
        });
      }
    });
  </script>
