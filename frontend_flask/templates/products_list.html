<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Product Types</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1>Product Types</h1>

  <div class="nav">
    <a href="/routes">Routes</a>
    <a href="/products/new">+ New Product Type</a>
  </div>

  <table>
    <thead>
      <tr>
        <th>product_code</th>
        <th>name</th>
        <th>storage_type</th>
        <th>actions</th>
      </tr>
    </thead>

    <tbody>
      {% for p in products %}
        <tr>
          <td>{{ p.product_code }}</td>
          <td>{{ p.name }}</td>
          <td>{{ p.storage_type }}</td>
          <td><a href="/products/{{ p.product_code }}/edit">Edit</a></td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
