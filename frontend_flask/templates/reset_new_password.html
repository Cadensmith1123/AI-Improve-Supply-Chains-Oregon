<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password - Local Food Supply Chain</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <h2>Set a New Password</h2>

        {% if error %}
            <div class="error-msg" style="display:block;">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('auth.reset_password_complete') }}">
            <input type="hidden" name="reset_token" value="{{ reset_token }}">
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required autofocus>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit">Update Password</button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('auth.login') }}">Back to login</a>
        </div>
    </div>
</body>
</html>
