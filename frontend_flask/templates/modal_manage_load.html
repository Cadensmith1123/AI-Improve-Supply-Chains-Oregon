  <!-- REUSABLE MANAGE LOAD MODAL -->
  <div class="modal-backdrop" id="modal-manage-load">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="manageLoadTitle">Manage Load</div>
        <button class="x" data-close>&times;</button>
      </div>

      <div class="modal-body">
        <div style="font-weight:900; margin-bottom: 8px;">Current Manifest</div>

        <div class="manifest-card" style="margin-bottom: 14px; max-height: 240px; overflow-y: auto;">
          <table class="manifest-table" style="width:100%; border-collapse:collapse;">
            <thead>
              <tr>
                <th style="text-transform:uppercase; letter-spacing:.05em; font-size:12px; color:#334155; position: sticky; top: 0; z-index: 5;">Product</th>
                <th style="text-transform:uppercase; letter-spacing:.05em; font-size:12px; color:#334155; position: sticky; top: 0; z-index: 5;">Qty</th>
                <th style="position: sticky; top: 0; z-index: 5;"></th>
              </tr>
            </thead>
            <tbody id="manifestBody"></tbody>
          </table>
        </div>

        <div style="font-weight:900; margin: 12px 0 8px;">Add / Update Product</div>

        <form method="post" id="addToLoadForm" action="" novalidate>
          <div class="grid2">
            <div class="field">
              <label>Product</label>
              <select name="product_id" id="loadProductSelect">
                <option value="">-- Select --</option>
                {% for p in products %}
                  <option value="{{ p.product_id }}">{{ p.product_name }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="field">
              <label>Quantity (Handling Units)</label>
              <input name="quantity" id="loadQtyInput" placeholder="e.g., 20">
            </div>
          </div>

          <div class="grid2">
            <div class="field">
              <label>Items/Pounds per Unit</label>
              <input name="items_per_unit" id="loadItemsPerUnitInput" placeholder="e.g., 12">
            </div>
            <div class="field">
              <label>Price per Item/Pound</label>
              <input name="price_per_item" id="loadPriceInput" placeholder="e.g., 5.99">
            </div>
          </div>

          <div style="font-weight:900; margin: 14px 0 8px;">Costs & Dimensions (optional)</div>
          <div class="grid2">
            <div class="field">
                <label>Cost per Item</label>
                <input name="cost_per_item" id="loadCostInput" placeholder="e.g., 0.70">
            </div>
            <div class="field">
                <label>Total Weight per Unit (lbs)</label>
                <input name="unit_weight" id="loadWeightInput" placeholder="e.g., 42">
            </div>
          </div>
          <div class="field">
            <label>Volume per Unit (cubic ft)</label>
            <input name="unit_volume" id="loadVolumeInput" placeholder="e.g., 1.25">
          </div>
          <div class="hint">If the product is already on the route, this updates its quantity.</div>
        </form>
      </div>

      <div class="modal-actions">
        <button class="btn primary" type="submit" form="addToLoadForm">Save to Manifest</button>
      </div>
    </div>
  </div>
