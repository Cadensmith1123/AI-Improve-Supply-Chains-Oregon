<!-- frontend_flask/templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Local Food Supply Chain</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <h2>Sign In</h2>
        {% if error %}<div class="error-msg" style="display:block;">{{ error }}</div>{% endif %}
        <div id="errorMsg" class="error-msg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <div class="auth-footer">
            Don't have an account? 
            <br>
            <a href="{{ url_for('auth.register') }}">Sign up</a>
            OR
            <a href="{{ url_for('auth.try_anonymous') }}">Try Without an Account</a> 
        <br>
            <a href="{{ url_for('auth.reset_password_form') }}">Forgot password?</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    //Store in Cookie
                    document.cookie = `token=${result.token}; path=/; max-age={{ jwt_ttl }}; SameSite=Lax`;
                    //Redirect to Dashboard
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = result.error || 'Login failed. Please check your credentials.';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error('Login error:', err);
                errorDiv.textContent = 'An unexpected error occurred.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
